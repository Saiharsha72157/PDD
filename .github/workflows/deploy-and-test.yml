name: Deploy and E2E Test

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'ResearchMateAI/package-lock.json'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci
        working-directory: ./ResearchMateAI

      - name: Build Application
        run: npx expo export -p web
        working-directory: ./ResearchMateAI

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./ResearchMateAI/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  e2e_tests:
    runs-on: ubuntu-latest
    needs: build_and_deploy
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r automation/requirements.txt
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Verify Deployment
        env:
          BASE_URL: ${{ needs.build_and_deploy.outputs.page_url }}
        run: |
          echo "Verifying deployment at $BASE_URL"
          for i in {1..5}; do
            HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" "$BASE_URL")
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "Deployment is LIVE and accessible (HTTP 200)."
              exit 0
            fi
            echo "Waiting for deployment to be ready... HTTP Status: $HTTP_STATUS"
            sleep 10
          done
          echo "Deployment verification failed after 5 attempts."
          exit 1

      - name: Run Selenium E2E Tests
        id: selenium
        env:
          BASE_URL: ${{ needs.build_and_deploy.outputs.page_url }}
        run: |
          cd automation
          pytest tests/test_suite.py --html=Test_Results/HTML/execution-report.html --self-contained-html -n 4 || true

      - name: Generate Reports
        env:
          BASE_URL: ${{ needs.build_and_deploy.outputs.page_url }}
        run: |
          cd automation
          python utils/report_generator.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test-Results-Artifacts
          path: |
            automation/Test_Results/
          retention-days: 30

      - name: Determine Pipeline Success
        run: |
          cd automation
          PASS_RATE=$(python -c 'import json, pandas as pd; df=pd.DataFrame(json.load(open("Test_Results/JSON/execution-results.json"))); passed=len(df[df["Status"]=="Passed"]); total=len(df); print((passed/total)*100 if total>0 else 0)')
          echo "Calculated Pass Rate: $PASS_RATE%"
          if (( $(echo "$PASS_RATE < 95.0" | bc -l) )); then
            echo "Pass rate ($PASS_RATE%) is below required 95%. Failing the workflow."
            exit 1
          else
            echo "Pass rate ($PASS_RATE%) meets or exceeds 95%. Workflow succeeds."
            exit 0
          fi
