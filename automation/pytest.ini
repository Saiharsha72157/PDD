[pytest]
addopts = -vs --tb=short --html=Test_Results/HTML/execution-report.html --self-contained-html
testpaths = tests
python_files = test_*.py
markers =
    auth: Authentication tests
    authz: Authorization tests
    nav: Navigation tests
    ui: UI Validation tests
    forms: Forms tests
    crud: CRUD Operations tests
    input: Input Validation tests
    error: Error Handling tests
    session: Session Management tests
    upload: File Upload tests
    a11y: Accessibility tests
    responsive: Responsive Design tests
    perf: Performance Smoke tests
    regression: Regression tests
