name: Selenium Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # You can adjust this to your specific Node.js version

    - name: Install project dependencies
      run: npm install

    - name: Install Selenium & Jest
      run: npm install --save-dev jest selenium-webdriver

    # Note: If your tests require your frontend server to be running, 
    # you might need to add a step here to start your server in the background.
    # e.g., run: npm start &

    - name: Run Selenium Tests
      # xvfb-run creates a virtual display so that Chrome can run without failing in a headless environment
      run: xvfb-run --auto-servernum npx jest selenium-tests/tests/login.test.js
