name: Selenium E2E Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ResearchMateAI

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'

    - name: Install Dependencies
      run: npm install

    - name: Start web server
      run: npm run web &
      env:
        CI: true

    - name: Wait for server to be ready
      run: npx wait-on http://localhost:8081

    - name: Run Selenium Tests
      run: npm run login
